kind = "web"
previewPath = "/"
title = "Monetium Agency"
version = "1.0.0"
id = "artifacts/monetium"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18333

[services.development]
run = "pnpm --filter @workspace/monetium run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/monetium", "run", "build" ]
publicDir = "artifacts/monetium/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18333"
BASE_PATH = "/"
